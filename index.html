<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【時光脈動・老台東】智慧導覽 v4.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8f5f0; color: #4a443f; }
        
        .map-bg {
            background-color: #eaddca;
            background-image: 
                linear-gradient(90deg, #d4c4ae 1px, transparent 1px),
                linear-gradient(#d4c4ae 1px, transparent 1px);
            background-size: 40px 40px;
            position: relative;
            overflow: hidden;
            border-radius: 2rem;
        }

        .street { position: absolute; background: #fffdfa; box-shadow: 0 0 10px rgba(0,0,0,0.05); }
        .street-v { width: 30px; height: 100%; }
        .street-h { height: 30px; width: 100%; }

        .station-marker {
            position: absolute;
            transform: translate(-50%, -50%);
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .station-marker:hover { transform: translate(-50%, -60%) scale(1.2); }

        .gemini-gradient { background: linear-gradient(135deg, #4285f4, #9b51e0, #e91e63); }
        
        @keyframes ripple {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(3); opacity: 0; }
        }
        .ripple {
            position: absolute;
            border: 2px solid #ea580c;
            border-radius: 50%;
            animation: ripple 2s infinite;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d4c4ae; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #c5b49d; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-4xl md:text-6xl font-black text-[#5d534a] mb-2 tracking-tighter">時光脈動・老台東</h1>
            <p class="text-stone-500 font-medium tracking-[0.2em] text-sm uppercase">智慧導覽系統 · 深度文史研究版</p>
            
            <div class="mt-6 flex flex-wrap justify-center gap-3 text-xs md:text-sm">
                <button onclick="unlockAudio()" id="audio-unlock-btn" class="bg-orange-100 text-orange-700 px-6 py-2 rounded-full font-bold border border-orange-200 shadow-sm transition-all active:scale-95">
                    <i class="fa-solid fa-unlock-keyhole mr-2"></i> 啟動語音導覽
                </button>
                <button onclick="toggleAIChat()" class="gemini-gradient text-white px-6 py-2 rounded-full font-bold shadow-lg transition-all active:scale-95">
                    <i class="fa-solid fa-wand-magic-sparkles mr-2"></i> 智慧領隊
                </button>
                <button onclick="promptGeminiKey()" class="bg-white text-stone-600 px-6 py-2 rounded-full font-bold border border-stone-200 shadow-sm">
                    配置 API Key
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- 景點地圖區 -->
            <div class="lg:col-span-6">
                <div class="map-bg h-[400px] md:h-[650px] border-4 border-white shadow-xl">
                    <div class="street street-v left-[20%]"></div>
                    <div class="street street-v left-[50%]"></div>
                    <div class="street street-v left-[80%]"></div>
                    <div class="street street-h top-[30%]"></div>
                    <div class="street street-h top-[70%]"></div>
                    <div id="markers-container"></div>
                </div>
            </div>

            <!-- 景點詳細資訊區 -->
            <div class="lg:col-span-6">
                <div id="detail-card" class="bg-white rounded-[2.5rem] p-6 md:p-8 shadow-xl border border-stone-100 h-[650px] flex flex-col">
                    <div id="detail-content" class="flex-1 overflow-y-auto custom-scrollbar pr-4">
                        <div class="h-full flex flex-col justify-center text-center py-10">
                            <i class="fa-solid fa-landmark text-7xl text-stone-100 mb-8 block"></i>
                            <h3 class="text-2xl font-black text-stone-400">點擊景點 · 走讀老台東</h3>
                            <p class="text-stone-400 mt-4 leading-loose text-sm">
                                每一處標記，都藏著一段被時光掩埋的故事。<br>
                                點擊左側地圖，開啟深度的歷史探索之旅。
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- AI 對話視窗 -->
    <div id="ai-chat" class="hidden fixed bottom-6 right-6 w-[90vw] md:w-80 h-[450px] bg-white shadow-2xl rounded-3xl z-50 flex flex-col border border-stone-200 overflow-hidden">
        <div class="gemini-gradient p-4 text-white font-bold flex justify-between items-center">
            <span class="flex items-center text-sm"><i class="fa-solid fa-robot mr-2"></i> 智慧領隊</span>
            <button onclick="toggleAIChat()">✕</button>
        </div>
        <div id="chat-box" class="flex-1 p-4 overflow-y-auto text-sm space-y-4 bg-stone-50 custom-scrollbar"></div>
        <div class="p-4 border-t bg-white">
            <div class="flex gap-2">
                <input type="text" id="chat-input" class="flex-1 border border-stone-200 p-3 rounded-xl text-sm outline-none" placeholder="想了解更多細節？問我吧...">
                <button onclick="askAI()" class="gemini-gradient text-white w-10 h-10 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const stations = [
            { 
                id: 1, x: 25, y: 35, title: "中央市場", 
                history: "台東中央市場成立於民國52年，是台東市區規模最大、歷史最悠久的傳統市場。這裡承載了台東半個多世紀的民生記憶。",
                architecture: "市場內部保留了典型的早期傳統市場結構，狹窄的走道與密集的攤位交織成獨特的社會空間。",
                story: "這裡最感人的篇章莫過於「賣菜阿嬤」陳樹菊女士。她在中央市場賣菜長達50多年，生活極其簡樸，卻將積攢下的千萬所得捐助給學校與孤兒院，讓這個市井之地成為台東慈悲精神的燈塔。清晨時分，您可以感受到最純粹的台東語言與生活氣息。" 
            },
            { 
                id: 2, x: 75, y: 25, title: "寶町藝文中心", 
                history: "寶町藝文中心原為日治時期的「台東街役場」職務宿舍群，興建於1936年（昭和11年）。「寶町」之名源自日治時期的地名寶町。",
                architecture: "建築群屬於典型的日式木造平房樣式，使用了大量的台灣檜木。屋頂覆蓋燻瓦，設有雨淋板與抬高地板，展現了當時適應台灣濕熱氣候的建築智慧。",
                story: "在戰後曾一度荒廢，後經台東市公所積極修復，於2004年重新對外開放。現在這片寧靜的日式宅邸，已從嚴肅的官舍轉變為推廣在地藝術與文史的空間，讓遊客能在此體會慢活的東岸時光。" 
            },
            { 
                id: 3, x: 45, y: 55, title: "中華會館", 
                history: "中華會館是台東少數留存的清領末期至日治初期建築，是當時旅台華僑組織的社交場所，具有高度的族群歷史意義。",
                architecture: "建築結合了中式紅磚屋面、西式圓拱長型門窗以及日式樑柱結構，形成一種獨特的折衷式建築風格。這種混血美學正反映了台東多元文化的交融。",
                story: "這座會館曾是台東漢移民與外界聯繫的中心，也是早期族群調解紛爭、互助合作的重要基點。斑駁的門牆訴說著百年前拓荒者在此紮根的艱辛，是走讀台東城市演進史不可或缺的一站。" 
            },
            { 
                id: 4, x: 15, y: 75, title: "大同戲院遺址", 
                history: "成立於民國47年的大同戲院，曾是台東縣內規模最大的豪華電影院，也是大同路繁榮時期的精神象徵。",
                architecture: "當時的建築規模壯麗，擁有超過千人的座位區。戲院周邊衍生的攤販與商家，構成了老台東人的娛樂核心區（俗稱台東的西門町）。",
                story: "在那個休閒活動匱乏的年代，大同戲院承載了無數家庭的聚會記憶與情侶約會。2009年的一場大火雖然帶走了建築物，但那份「電影散場後在街口吃宵夜」的情懷依然活在老一輩台東人的敘述中。現在雖為空地，卻是老街導覽中最具共鳴的時空斷層。" 
            },
            { 
                id: 5, x: 65, y: 80, title: "正氣路觀光夜市", 
                history: "正氣路最早是台東的水果集散地，鄰近早期的火車站，自古便是商業交流的動脈。隨著火車站遷址與觀光發展，轉型為現在的夜市格局。",
                architecture: "這條街道呈現了台東典型的住商混合風貌。白天是繁忙的市場延伸（水果街），入夜後則變身為動態的夜間觀光廊道。",
                story: "正氣路最迷人之處在於它的「雙重靈魂」。白天您能買到全台品質最好的釋迦與紅龍果；晚上則能品嚐到傳承數十年的臭豆腐、米苔目與各類創意小吃。這條路用它的「味道」，寫下了台東從傳統農產小鎮到觀光名城的轉型史。" 
            }
        ];

        let geminiKey = sessionStorage.getItem('gemini_key') || "";
        let audioUnlocked = false;

        function initMarkers() {
            const container = document.getElementById('markers-container');
            container.innerHTML = "";
            stations.forEach(s => {
                const el = document.createElement('div');
                el.className = 'station-marker';
                el.style.left = s.x + '%';
                el.style.top = s.y + '%';
                el.innerHTML = `
                    <div class="relative group">
                        <div class="ripple"></div>
                        <div class="w-14 h-14 bg-[#5d534a] rounded-full border-4 border-white shadow-lg flex items-center justify-center text-white font-black text-xl relative z-20 group-hover:bg-orange-700 transition-colors">
                            ${s.id}
                        </div>
                        <div class="absolute -bottom-10 left-1/2 -translate-x-1/2 bg-stone-800 text-white px-3 py-1 rounded text-xs font-bold shadow-lg whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity">
                            ${s.title}
                        </div>
                    </div>
                `;
                el.onclick = () => selectStation(s);
                container.appendChild(el);
            });
        }

        function unlockAudio() {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance('老台東深度導覽系統已準備就緒，歡迎探索。');
            u.lang = 'zh-TW';
            u.rate = 0.95;
            window.speechSynthesis.speak(u);
            
            audioUnlocked = true;
            const btn = document.getElementById('audio-unlock-btn');
            btn.innerHTML = `<i class="fa-solid fa-check mr-2"></i> 導覽語音已就緒`;
            btn.classList.replace('bg-orange-100', 'bg-green-100');
            btn.classList.replace('text-orange-700', 'text-green-700');
            btn.disabled = true;
        }

        function selectStation(s) {
            const content = document.getElementById('detail-content');
            content.className = "animate-fadeIn flex flex-col";
            content.innerHTML = `
                <div class="mb-8">
                    <span class="inline-block bg-[#5d534a] text-white text-[10px] font-black px-4 py-1.5 rounded-full mb-4 uppercase tracking-[0.2em] shadow-md">
                        Historical Archive · No. ${s.id}
                    </span>
                    <h2 class="text-4xl font-black text-stone-800 border-l-8 border-orange-500 pl-4 mb-2">${s.title}</h2>
                    <p class="text-stone-400 font-bold text-xs pl-6 italic uppercase tracking-widest">Taitung Heritage Walking Tour</p>
                </div>
                
                <div class="space-y-8 pr-2">
                    <section>
                        <h4 class="flex items-center gap-2 text-stone-800 font-black mb-3 text-lg">
                            <i class="fa-solid fa-hourglass-start text-orange-500"></i>
                            <span class="border-b-2 border-orange-500/30">時光背景</span>
                        </h4>
                        <p class="text-stone-600 leading-[1.8] text-base text-justify pl-7">${s.history}</p>
                    </section>

                    <section>
                        <h4 class="flex items-center gap-2 text-stone-800 font-black mb-3 text-lg">
                            <i class="fa-solid fa-compass-drafting text-orange-500"></i>
                            <span class="border-b-2 border-orange-500/30">建築特色</span>
                        </h4>
                        <p class="text-stone-600 leading-[1.8] text-base text-justify pl-7">${s.architecture}</p>
                    </section>

                    <section>
                        <h4 class="flex items-center gap-2 text-stone-800 font-black mb-3 text-lg">
                            <i class="fa-solid fa-feather-pointed text-orange-500"></i>
                            <span class="border-b-2 border-orange-500/30">人文記憶</span>
                        </h4>
                        <p class="text-stone-600 leading-[1.8] text-base text-justify pl-7">${s.story}</p>
                    </section>
                </div>

                <div class="mt-10 mb-6 sticky bottom-0 bg-white/90 backdrop-blur-md pt-6 border-t border-stone-100">
                    <button onclick="playTour('${s.title}。歷史背景：${s.history}。建築特色：${s.architecture}。人文記憶：${s.story}')" class="w-full bg-[#5d534a] text-white py-5 rounded-3xl font-bold flex items-center justify-center gap-4 hover:bg-orange-700 transition-all active:scale-95 shadow-2xl">
                        <i class="fa-solid fa-microphone-lines text-2xl"></i>
                        <span class="text-lg">深度全文導覽朗讀</span>
                    </button>
                </div>
            `;
            
            if(audioUnlocked) {
                // 自動播放時只唸標題與重點介紹
                playTour(`${s.title}。${s.history}`);
            }
        }

        function playTour(text) {
            if(!audioUnlocked) {
                alert("請點擊頁面頂端的『啟動語音導覽』按鈕，開啟與老台東的音訊連結。");
                return;
            }
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW';
            utterance.rate = 0.92;
            window.speechSynthesis.speak(utterance);
        }

        function toggleAIChat() {
            document.getElementById('ai-chat').classList.toggle('hidden');
        }

        function promptGeminiKey() {
            const key = prompt("請輸入您的 Gemini API Key：", geminiKey);
            if(key) {
                geminiKey = key;
                sessionStorage.setItem('gemini_key', key);
            }
        }

        async function askAI() {
            if(!geminiKey) { alert("請先配置 API Key。"); return; }
            const input = document.getElementById('chat-input');
            const chatBox = document.getElementById('chat-box');
            const msg = input.value.trim();
            if(!msg) return;

            chatBox.innerHTML += `
                <div class="flex justify-end">
                    <div class="bg-stone-800 text-white p-3 rounded-2xl rounded-tr-none max-w-[85%] shadow-md">
                        ${msg}
                    </div>
                </div>`;
            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${geminiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `你是一位在台東深耕數十年的文史研究員，請用優雅且富含歷史底蘊的口吻回答遊客的問題：${msg}` }] }] })
                });
                const data = await res.json();
                const reply = data.candidates[0].content.parts[0].text;
                chatBox.innerHTML += `
                    <div class="flex justify-start">
                        <div class="bg-white p-4 rounded-2xl rounded-tl-none border border-stone-100 shadow-sm max-w-[85%] text-stone-700 leading-relaxed text-sm">
                            ${reply}
                        </div>
                    </div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (e) {
                chatBox.innerHTML += `<div class="text-center text-red-500 text-[10px] py-2">通訊中斷，請確認 API Key 設定。</div>`;
            }
        }

        window.onload = initMarkers;
    </script>
</body>
</html>
