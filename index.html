<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>【時光脈動・老台東】智慧導覽 v12.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8f5f0; color: #4a443f; -webkit-tap-highlight-color: transparent; }
        
        .map-bg {
            background-color: #eaddca;
            background-image: 
                linear-gradient(90deg, rgba(212,196,174,0.3) 1px, transparent 1px),
                linear-gradient(rgba(212,196,174,0.3) 1px, transparent 1px);
            background-size: 20px 20px;
            position: relative;
            overflow: hidden;
            border-radius: 2rem;
            border: 4px solid #fff;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        .street { 
            position: absolute; 
            background: rgba(255, 253, 250, 0.8); 
            backdrop-filter: blur(2px);
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; color: #a39689; font-weight: bold; letter-spacing: 2px;
            pointer-events: none; z-index: 1; border-radius: 4px;
        }
        .street-v { width: 30px; height: 80%; writing-mode: vertical-rl; top: 10%; }
        .street-h { height: 30px; width: 80%; left: 10%; }

        .station-marker {
            position: absolute; transform: translate(-50%, -50%);
            cursor: pointer; z-index: 20;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes ripple {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
        }
        .ripple { position: absolute; border: 2px solid #ea580c; border-radius: 50%; animation: ripple 2s infinite; }

        .active-scale:active { transform: scale(0.95); }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d4c4ae; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-4xl md:text-5xl font-black text-[#5d534a] mb-2 tracking-tighter">時光脈動・老台東</h1>
            <p class="text-stone-500 font-medium tracking-[0.2em] text-xs uppercase">智慧領隊系統 · 全功能暫停重播版</p>
            
            <div class="mt-6">
                <button onclick="unlockAudio(true)" id="audio-unlock-btn" class="bg-orange-600 text-white px-10 py-4 rounded-full font-bold shadow-lg flex items-center mx-auto active-scale transition-all">
                    <i class="fa-solid fa-volume-high mr-2 text-xl"></i> 啟動智慧領隊
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- 地圖區域 -->
            <div class="lg:col-span-5 relative">
                <div class="map-bg h-[450px] md:h-[700px]">
                    <div class="street street-v left-[15%]">中 山 路</div>
                    <div class="street street-v left-[50%]">中 正 路</div>
                    <div class="street street-v left-[85%]">光 明 路</div>
                    <div class="street street-h top-[25%]">大 同 路</div>
                    <div class="street street-h top-[75%]">正 氣 路</div>
                    <div id="markers-container"></div>
                </div>

                <!-- 據點上方浮動暫停鍵 -->
                <div id="map-mini-control" class="hidden absolute top-4 left-1/2 -translate-x-1/2 bg-white/95 backdrop-blur-md px-4 py-2 rounded-full shadow-xl z-30 border border-orange-100 flex items-center gap-3">
                    <span id="mini-title" class="text-xs font-bold text-stone-700 truncate max-w-[100px]">導覽中</span>
                    <div class="h-4 w-[1px] bg-stone-300"></div>
                    <button onclick="togglePauseResume()" class="text-orange-600 p-1 active-scale">
                        <i id="mini-pause-icon" class="fa-solid fa-pause"></i>
                    </button>
                </div>
            </div>

            <!-- 詳細介紹區域 -->
            <div class="lg:col-span-7">
                <div id="detail-card" class="bg-white rounded-[2.5rem] p-6 md:p-10 shadow-xl border border-stone-100 h-[500px] md:h-[700px] flex flex-col relative overflow-hidden">
                    <div id="detail-content" class="flex-1 overflow-y-auto custom-scrollbar pr-2">
                        <div class="h-full flex flex-col justify-center text-center py-10">
                            <i class="fa-solid fa-map-marked-alt text-7xl text-stone-100 mb-8 block"></i>
                            <h3 class="text-2xl font-black text-stone-400">請先啟動並點擊標記</h3>
                            <p class="text-stone-400 mt-4 leading-loose max-w-sm mx-auto">
                                點擊地圖編號，聆聽各景點詳細歷史、特色與美食。
                            </p>
                        </div>
                    </div>

                    <!-- 下方主控台：暫停按鈕 + 重播按鈕 -->
                    <div id="main-control-bar" class="hidden absolute bottom-0 left-0 right-0 bg-gradient-to-t from-white via-white/95 to-transparent pt-10 pb-6 px-6 md:px-10 z-20">
                        <div class="flex gap-4">
                            <!-- 暫停/繼續導覽 -->
                            <button id="main-play-pause-btn" onclick="togglePauseResume()" class="flex-1 bg-stone-800 text-white py-5 rounded-2xl font-bold shadow-lg flex items-center justify-center gap-3 active-scale transition-all">
                                <i id="main-pause-icon" class="fa-solid fa-pause text-xl"></i>
                                <span id="main-pause-text">暫停語音導覽</span>
                            </button>
                            <!-- 重播鍵 -->
                            <button onclick="playTour(currentText)" class="w-20 bg-stone-100 text-stone-500 py-5 rounded-2xl flex items-center justify-center active-scale shadow-sm">
                                <i class="fa-solid fa-rotate-right text-xl"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const stations = [
            { id: 1, x: 20, y: 30, title: "台東市中央市場", history: "台東市中央市場的根源可追溯至日治時期，現今規模成形於1963年。它是東台灣最大的零售物資集散中心，更是台東人的靈魂胃袋。", features: "傳統公有市場結構，內部街道縱橫，保留了早期的建築格局與庶民氣息。", food: "阿鋐炸雞、傳統米苔目、市場內隱藏版新鮮海味。" },
            { id: 2, x: 75, y: 20, title: "寶町藝文中心", history: "1936年落成，原為台東街役場高級官員宿舍。整建後保留了完整的黑瓦、雨淋板與日式庭園。", features: "日治時期官方建築典型，環境幽靜，是攝影愛好者與歷史迷的必訪地點。", food: "中正路老字號豆花、周邊文青咖啡廳、在地簡餐。" },
            { id: 3, x: 50, y: 55, title: "台東中華會館", history: "1927年落成，磚木混合建築。曾是台東華僑組織的核心，也是地方抗日意識的集合地。", features: "中西合璧建築風格，見證台東多元族群融合與地方發展的歷史脈絡。", food: "神農茶、在地傳統麵攤、古早味冰品。" },
            { id: 4, x: 15, y: 80, title: "大同戲院遺址", history: "1958年落成，曾是台東最豪華影城。2009年火災後退出歷史舞台，保留了老台東人的娛樂與約會回憶。", features: "早期娛樂地標遺址，雖然建築已毀，但仍是台東人共同的時代印記。", food: "大同路蔥油餅、楊記家傳地瓜酥。" },
            { id: 5, x: 65, y: 80, title: "台東觀光夜市", history: "位於正氣路。晝則水果街，夜則觀光市。實現了時空變換的在地文化活化，是體驗台東生活力必到之處。", features: "全長數百公尺攤位排列，匯集了台東在地小吃與創意料理精華。", food: "東山鴨頭、烤肉割包、現切在地水果（釋迦、鳳梨）。" }
        ];

        let audioUnlocked = false;
        let currentText = "";
        let isPaused = false;
        let speechSynth = window.speechSynthesis;

        function unlockAudio(showGreeting = false) {
            speechSynth.cancel();
            const silent = new SpeechSynthesisUtterance(' ');
            silent.volume = 0;
            speechSynth.speak(silent);
            audioUnlocked = true;
            document.getElementById('audio-unlock-btn').className = "bg-green-600 text-white px-10 py-4 rounded-full font-bold shadow-lg flex items-center mx-auto transition-all";
            document.getElementById('audio-unlock-btn').innerHTML = '<i class="fa-solid fa-check-circle mr-2"></i> 智慧領隊已就緒';
            if (showGreeting) playTour('您好，智慧領隊已準備就緒，請點擊地圖編號開始導覽。');
        }

        function initMarkers() {
            const container = document.getElementById('markers-container');
            stations.forEach(s => {
                const el = document.createElement('div');
                el.className = 'station-marker';
                el.style.left = s.x + '%'; el.style.top = s.y + '%';
                el.innerHTML = `<div class="relative group"><div class="ripple"></div><div class="w-12 h-12 bg-stone-800 rounded-full border-4 border-white shadow-lg flex items-center justify-center text-white font-black text-lg group-hover:bg-orange-600 transition-all">${s.id}</div></div>`;
                el.onclick = () => selectStation(s);
                container.appendChild(el);
            });
        }

        function selectStation(s) {
            if (!audioUnlocked) {
                document.getElementById('audio-unlock-btn').classList.add('animate-bounce');
                return;
            }
            currentText = `${s.title}。${s.history}。景點特色：${s.features}。美食推薦：${s.food}`;
            isPaused = false;
            document.getElementById('map-mini-control').classList.remove('hidden');
            document.getElementById('main-control-bar').classList.remove('hidden');
            document.getElementById('mini-title').innerText = s.title;
            
            const content = document.getElementById('detail-content');
            content.innerHTML = `
                <div class="animate-fadeIn pb-32">
                    <h2 class="text-3xl font-black text-stone-800 mb-6 border-l-8 border-orange-600 pl-4">${s.title}</h2>
                    <div class="space-y-8">
                        <section><h4 class="font-bold text-stone-400 mb-2">【歷史背景】</h4><p class="text-lg text-stone-600 leading-relaxed">${s.history}</p></section>
                        <section class="bg-stone-50 p-6 rounded-3xl"><h4 class="font-bold text-orange-600 mb-2">【周邊特色】</h4><p class="text-stone-600">${s.features}</p></section>
                        <section class="bg-orange-50 p-6 rounded-3xl"><h4 class="font-bold text-orange-700 mb-2">【在地美食】</h4><p class="text-stone-700">${s.food}</p></section>
                    </div>
                </div>`;
            playTour(currentText);
        }

        function playTour(text) {
            speechSynth.cancel();
            isPaused = false;
            setTimeout(() => {
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'zh-TW';
                u.onstart = () => updateUI(false);
                u.onend = () => { if(!isPaused) updateUI(true, true); };
                speechSynth.speak(u);
            }, 100);
        }

        function togglePauseResume() {
            if (speechSynth.speaking && !isPaused) {
                speechSynth.pause();
                isPaused = true;
                updateUI(true);
            } else if (isPaused) {
                speechSynth.resume();
                isPaused = false;
                setTimeout(() => { if(!speechSynth.speaking) playTour(currentText); }, 150);
                updateUI(false);
            } else {
                playTour(currentText);
            }
        }

        function updateUI(paused, ended = false) {
            const mIcon = document.getElementById('mini-pause-icon');
            const mainIcon = document.getElementById('main-pause-icon');
            const mainText = document.getElementById('main-pause-text');
            const mainBtn = document.getElementById('main-play-pause-btn');

            if (paused) {
                if(mIcon) mIcon.className = "fa-solid fa-play";
                if(mainIcon) mainIcon.className = "fa-solid fa-play text-xl";
                if(mainText) mainText.innerText = ended ? "重新播放導覽" : "繼續播放";
                if(mainBtn) mainBtn.classList.replace('bg-stone-800', 'bg-orange-600');
            } else {
                if(mIcon) mIcon.className = "fa-solid fa-pause";
                if(mainIcon) mainIcon.className = "fa-solid fa-pause text-xl";
                if(mainText) mainText.innerText = "暫停語音導覽";
                if(mainBtn) mainBtn.classList.replace('bg-orange-600', 'bg-stone-800');
            }
        }

        window.onload = () => { initMarkers(); };
    </script>
</body>
</html>
