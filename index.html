<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【時光脈動・老台東】智慧導覽路線圖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f4f1ea;
            color: #4a3f35;
        }

        .map-container {
            position: relative;
            background: #e5e0d3;
            border: 2px solid #8d7b68;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16/9;
            min-height: 400px;
        }

        .map-point {
            position: absolute;
            width: 32px;
            height: 32px;
            background: #c2410c;
            border: 3px solid white;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: transform 0.3s, background 0.3s;
            z-index: 10;
        }

        .map-point:hover {
            transform: scale(1.2);
            background: #9a3412;
        }

        .map-point.active {
            background: #164e63;
            box-shadow: 0 0 15px rgba(22, 78, 99, 0.5);
        }

        .station-card {
            transition: all 0.3s ease;
        }

        .station-card.active {
            border-left: 6px solid #c2410c;
            background-color: white;
            transform: translateX(10px);
        }

        .gemini-gradient {
            background: linear-gradient(135deg, #4285f4, #9b51e0, #e91e63);
        }

        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-in {
            animation: slideIn 0.3s ease-out;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
        <header class="bg-[#8d7b68] text-white p-6 text-center relative">
            <h1 class="text-3xl md:text-4xl font-bold mb-2">【時光脈動・老台東】</h1>
            <p class="text-lg opacity-90 italic">從日治行政到戲院遺蹤的庶民走讀</p>
            <button onclick="toggleAIChat()" class="absolute right-6 bottom-4 gemini-gradient text-white px-5 py-2 rounded-full text-sm font-bold shadow-lg hover:scale-105 transition-transform flex items-center">
                <i class="fa-solid fa-robot mr-2"></i> ✨ 智慧嚮導
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3">
            <div class="p-6 lg:border-r border-gray-100 bg-stone-50 overflow-y-auto max-h-[800px]">
                <div class="mb-6 p-4 bg-orange-100 border-l-4 border-orange-500 rounded">
                    <p class="text-sm font-bold text-orange-800"><i class="fa-solid fa-person-walking mr-2"></i>步行路線概覽</p>
                    <p class="text-xs text-orange-700 mt-1">起點：新生路與中山路口 | 全長約 1.5km</p>
                </div>
                <div class="space-y-4" id="station-list"></div>
            </div>

            <div class="col-span-2 p-6 bg-white relative">
                <div class="map-container mb-6 shadow-inner relative">
                    <div id="map-points"></div>
                    <div class="absolute bottom-2 right-2 bg-white/80 p-2 rounded text-[10px] border border-stone-300">
                        <p><i class="fa-solid fa-location-dot text-orange-700 mr-1"></i> 點擊點位可切換景點</p>
                    </div>
                </div>

                <div id="details-box" class="bg-white p-6 rounded-xl border border-stone-200 shadow-sm min-h-[400px] relative">
                    <div id="station-detail"></div>
                </div>

                <div id="ai-chat-window" class="hidden absolute inset-4 bg-white/95 z-50 rounded-xl shadow-2xl border-2 border-purple-100 flex flex-col overflow-hidden animate-slide-in">
                    <div class="gemini-gradient p-4 text-white flex justify-between items-center">
                        <div class="flex items-center">
                            <i class="fa-solid fa-robot mr-3 text-xl"></i>
                            <div>
                                <h3 class="font-bold">✨ Gemini 台東文史嚮導</h3>
                                <p class="text-[10px] opacity-80">具備歷史洞察與語音合成能力</p>
                            </div>
                        </div>
                        <button onclick="toggleAIChat()" class="hover:bg-white/20 p-2 rounded-full"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                    <div id="chat-history" class="flex-1 overflow-y-auto p-4 space-y-4 text-sm scroll-smooth"></div>
                    <div class="p-4 border-t border-gray-100 bg-gray-50 flex gap-2">
                        <input type="text" id="ai-input" placeholder="問問台東的歷史..." class="flex-1 border border-gray-300 rounded-full px-4 py-2 text-sm focus:ring-2 focus:ring-purple-500 outline-none">
                        <button onclick="askAI()" id="ai-send-btn" class="gemini-gradient text-white w-10 h-10 rounded-full flex items-center justify-center shadow-md">
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        const stations = {
            1: {
                title: "中央市場",
                subtitle: "台東人的靈魂胃袋",
                desc: "1963年正式啟用，是台東規模最大、人情味最濃的傳統市場。這裡藏著傳奇人物陳樹菊女士的菜攤。",
                icon: "fa-basket-shopping",
                coords: { top: "70%", left: "20%" },
                prompt: "告訴我更多關於台東中央市場的歷史與陳樹菊女士的事蹟。"
            },
            2: {
                title: "寶町藝文中心",
                subtitle: "日治官舍重生",
                desc: "建於1936年，原為台東街役場宿舍群。這組道地的日式木構造建築，見證了日治時期官員的生活空間。",
                icon: "fa-house-chimney",
                coords: { top: "30%", left: "20%" },
                prompt: "請詳細介紹寶町藝文中心的日式建築特色與當時的生活情境。"
            },
            3: {
                title: "中華會館",
                subtitle: "全台唯一的華僑見證",
                desc: "1927年由旅台華僑集資興建，其巴洛克山牆上的稻穗與黨徽鑲嵌，記錄了台東華僑的抗日與團結歷史。",
                icon: "fa-landmark",
                coords: { top: "15%", left: "55%" },
                prompt: "中華會館在抗日時期扮演什麼角色？對台東華僑的意義為何？"
            },
            4: {
                title: "大同市場攤販部",
                subtitle: "時光遺落的角落",
                desc: "整合導覽：來來來，少年家，先坐一下，這杯紅烏龍趁熱喝。你問起「大同戲院」啊？它簡直就是當時台東人的「精神客廳」與「心臟」。民國47年開幕時是多氣派的地標！門口總是飄著炭烤魷魚與玉米的焦香，手繪的海報下擠滿了穿著平整襯衫與漂亮裙子的少男少女。它撐起了周圍的銀樓、西服店與冰果室，是大同路的黃金年代。雖然後來隨火車站搬遷與2009年的一場大火而落幕，但那種「大家聚在一起做夢」的精神，至今仍活在老台東人的話語裡。",
                icon: "fa-film",
                coords: { top: "45%", left: "65%" },
                prompt: "請以整合後的內容為基礎，跟我分享大同戲院從全盛到落幕的故事。"
            },
            5: {
                title: "觀光夜市 (正氣路)",
                subtitle: "晝夜交替的活力",
                desc: "正氣路在白天是著名水果街，晚上則轉身為觀光夜市，體現了台東人靈活且充滿生命力的生活。",
                icon: "fa-utensils",
                coords: { top: "75%", left: "50%" },
                prompt: "描述台東正氣路從清晨水果批發到深夜夜市的日常轉變。"
            }
        };

        let currentStationId = 1;

        function initStations() {
            const list = document.getElementById('station-list');
            const mapPoints = document.getElementById('map-points');
            Object.keys(stations).forEach(id => {
                const s = stations[id];
                list.innerHTML += `
                    <div id="card-${id}" class="station-card p-4 rounded-lg cursor-pointer hover:bg-white border border-transparent" onclick="selectStation(${id})">
                        <h3 class="font-bold text-lg flex items-center">
                            <span class="w-6 h-6 bg-orange-700 text-white rounded-full text-xs flex items-center justify-center mr-2">${id}</span>
                            ${s.title}
                        </h3>
                    </div>
                `;
                mapPoints.innerHTML += `
                    <div id="point-${id}" class="map-point" style="top: ${s.coords.top}; left: ${s.coords.left};" onclick="selectStation(${id})">${id}</div>
                `;
            });
            selectStation(1);
        }

        function selectStation(id) {
            currentStationId = id;
            document.querySelectorAll('.station-card').forEach(c => c.classList.remove('active', 'bg-white', 'border-gray-200'));
            document.querySelectorAll('.map-point').forEach(p => p.classList.remove('active'));
            document.getElementById(`card-${id}`).classList.add('active', 'bg-white', 'border-gray-200');
            document.getElementById(`point-${id}`).classList.add('active');

            const s = stations[id];
            document.getElementById('station-detail').innerHTML = `
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h2 class="text-3xl font-bold text-stone-800 mb-1">${s.title}</h2>
                        <p class="text-orange-700 font-bold flex items-center"><i class="fa-solid ${s.icon} mr-2"></i> ${s.subtitle}</p>
                    </div>
                    <div class="flex flex-col gap-2 items-end">
                         <button id="tts-ai-btn" onclick="generateDynamicTour(${id})" class="gemini-gradient text-white px-4 py-2 rounded-full text-xs font-bold shadow-md hover:scale-105 transition-transform flex items-center gap-2">
                            <i class="fa-solid fa-wand-magic-sparkles"></i> ✨ 產製 AI 劇本導覽
                        </button>
                    </div>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                    <div class="space-y-4">
                        <p class="text-stone-600 leading-relaxed bg-stone-50 p-4 rounded-lg border border-stone-100">${s.desc}</p>
                        <div class="flex gap-2">
                             <button onclick="toggleAIChat('${s.prompt}')" class="flex-1 bg-purple-100 text-purple-700 border border-purple-200 px-4 py-2 rounded-lg text-sm font-bold hover:bg-purple-200 transition-colors">✨ 詢問 AI 故事</button>
                             <button onclick="visualizeHistory(${id})" class="flex-1 bg-blue-100 text-blue-700 border border-blue-200 px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-200 transition-colors">✨ 懷舊意象生成</button>
                        </div>
                    </div>
                    <div id="visualizer-container" class="bg-stone-100 rounded-lg overflow-hidden border border-stone-200 min-h-[180px] flex items-center justify-center relative">
                         <p class="text-stone-400 text-xs italic p-4 text-center">點擊上方按鈕，由 Gemini 描繪該景點的歷史意象圖...</p>
                    </div>
                </div>
            `;
        }

        async function generateDynamicTour(id) {
            const btn = document.getElementById('tts-ai-btn');
            const station = stations[id];
            const originalHTML = btn.innerHTML;
            
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> 撰寫劇本中...`;
            btn.disabled = true;

            try {
                const textResponse = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `你是一位精通台東文史的老導覽員，請根據以下整合資訊，為景點「${station.title}」撰寫一段約 150 字的口語化導覽稿。要包含其歷史地位、一個關於氣味或視覺的細節，並用一種懷舊且溫暖的語氣。整合資訊：${station.desc}` }] }]
                    })
                });
                
                const textData = await textResponse.json();
                const script = textData.candidates?.[0]?.content?.parts?.[0]?.text;

                if (!script) throw new Error("劇本生成失敗");

                btn.innerHTML = `<i class="fa-solid fa-microphone-lines fa-pulse"></i> ✨ 語音合成中...`;
                
                const ttsResponse = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: script }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: {
                                voiceConfig: { 
                                    prebuiltVoiceConfig: { voiceName: "Kore" } 
                                }
                            }
                        }
                    })
                });
                const ttsData = await ttsResponse.json();
                const audioBase64 = ttsData.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;

                if (!audioBase64) throw new Error("音訊生成失敗");

                const audioBlob = pcmToWav(audioBase64, 24000);
                const url = URL.createObjectURL(audioBlob);
                const audio = new Audio(url);
                
                audio.onplay = () => btn.innerHTML = `<i class="fa-solid fa-play"></i> 正在播放 AI 導覽...`;
                audio.onended = () => {
                    btn.innerHTML = originalHTML;
                    btn.disabled = false;
                    URL.revokeObjectURL(url);
                };
                await audio.play();

            } catch (err) {
                console.error("Tour Generation Error:", err);
                btn.innerHTML = `<i class="fa-solid fa-circle-exclamation text-red-500"></i> 導覽稍後重試`;
                setTimeout(() => { btn.innerHTML = originalHTML; btn.disabled = false; }, 3000);
            }
        }

        async function visualizeHistory(id) {
            const container = document.getElementById('visualizer-container');
            const station = stations[id];
            
            container.innerHTML = `
                <div class="w-full h-full flex flex-col items-center justify-center p-4 bg-stone-100">
                    <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-2"></div>
                    <p class="text-xs text-blue-600 font-bold">✨ Gemini 正在繪製懷舊意象...</p>
                </div>
            `;

            try {
                const promptText = `A cinematic, nostalgic oil painting style image of ${station.title} in Taitung during the 1960s. Show traditional architecture, old shop signs with traditional Chinese characters, vintage bicycles, and people in 60s attire. Warm morning light, slightly faded colors, high detail, historical atmosphere.`;
                
                const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        instances: [{ prompt: promptText }],
                        parameters: { sampleCount: 1 }
                    })
                });
                
                const data = await response.json();
                
                if (data.predictions && data.predictions[0] && data.predictions[0].bytesBase64Encoded) {
                    const imageUrl = `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
                    container.innerHTML = `
                        <img src="${imageUrl}" class="w-full h-full object-cover animate-slide-in" alt="AI Generated History">
                        <div class="absolute bottom-0 inset-x-0 bg-black/50 p-2 text-[10px] text-white backdrop-blur-sm">
                            ✨ AI 模擬之懷舊意象
                        </div>
                    `;
                } else {
                    throw new Error("Invalid image data received");
                }
            } catch (err) {
                console.error("VisualizeHistory Error:", err);
                const msg = err.message.includes("Auth Error") ? "金鑰驗證失敗 (401)" : "繪圖暫時休息中，請稍後重試。";
                container.innerHTML = `<p class="text-red-400 text-xs p-4 text-center">${msg}</p>`;
            }
        }

        async function askAI(customPrompt = null) {
            const input = document.getElementById('ai-input');
            const history = document.getElementById('chat-history');
            const query = customPrompt || input.value.trim();
            if (!query) return;

            history.innerHTML += `<div class="flex justify-end"><div class="bg-purple-600 text-white p-3 rounded-lg max-w-[85%] shadow-sm">${query}</div></div>`;
            input.value = "";
            const loadingId = "load-" + Date.now();
            history.innerHTML += `<div id="${loadingId}" class="flex justify-start"><div class="bg-gray-100 p-3 rounded-lg text-gray-500 italic flex items-center gap-2"><i class="fa-solid fa-sparkles animate-pulse"></i> 搜尋歷史卷軸中...</div></div>`;
            history.scrollTop = history.scrollHeight;

            try {
                const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: query }] }],
                        systemInstruction: { parts: [{ text: "你是一位精通台東文史的在地嚮導，專長是將乾澀的史料轉化為動人的庶民故事。請用親切、帶點懷舊情感的口吻回答。特別是對於「大同戲院」，請連結它作為台東心臟、西門町以及與舊火車站商圈興衰的關係。你的對話要像是在午後巷弄裡跟遊客聊天一樣自然。" }] }
                    })
                });
                const result = await response.json();
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text || "哎呀，這段記憶似乎隱沒在太平洋的浪潮中了，請稍後再問我。";
                
                const loader = document.getElementById(loadingId);
                if (loader) loader.remove();
                history.innerHTML += `<div class="flex justify-start"><div class="bg-white border border-purple-100 p-3 rounded-lg max-w-[85%] border-l-4 border-purple-500 shadow-sm leading-relaxed">${text}</div></div>`;
                history.scrollTop = history.scrollHeight;
            } catch (err) {
                console.error("AskAI Error:", err);
                const loader = document.getElementById(loadingId);
                if (loader) loader.innerHTML = `<span class="text-red-400 text-xs">老嚮導連線不穩 (${err.message})，請重試。</span>`;
            }
        }

        async function fetchWithRetry(url, options, maxRetries = 5) {
            let lastError = null;
            let delay = 1000;
            const finalUrl = url.includes('?') ? `${url}&key=${apiKey}` : `${url}?key=${apiKey}`;

            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(finalUrl, options);
                    if (!response.ok) {
                        let errorMsg = `Status ${response.status}`;
                        try {
                            const errorJson = await response.json();
                            errorMsg = errorJson.error?.message || errorMsg;
                        } catch (e) { }
                        if (response.status === 401) throw new Error(`Auth Error: ${errorMsg}`);
                        if (response.status === 429 || response.status >= 500) {
                            throw new Error(errorMsg);
                        } else {
                            throw new Error(`Client Error: ${errorMsg}`);
                        }
                    }
                    const data = await response.json();
                    return { ok: true, json: () => Promise.resolve(data) };
                } catch (err) {
                    lastError = err;
                    if (err.message.includes("Auth Error") || err.message.includes("Client Error")) break; 
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2;
                }
            }
            throw lastError || new Error("Fetch Failed");
        }

        function pcmToWav(base64, sampleRate) {
            const binaryString = atob(base64);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) bytes[i] = binaryString.charCodeAt(i);
            const view = new DataView(new ArrayBuffer(44 + bytes.length));
            const writeString = (o, s) => { for(let i=0; i<s.length; i++) view.setUint8(o+i, s.charCodeAt(i)); };
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + bytes.length, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); 
            view.setUint16(22, 1, true); 
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true); 
            view.setUint16(32, 2, true); 
            view.setUint16(34, 16, true); 
            writeString(36, 'data');
            view.setUint32(40, bytes.length, true);
            new Uint8Array(view.buffer, 44).set(bytes);
            return new Blob([view], { type: 'audio/wav' });
        }

        function toggleAIChat(prompt = null) {
            const win = document.getElementById('ai-chat-window');
            win.classList.toggle('hidden');
            if (prompt && !win.classList.contains('hidden')) {
                askAI(prompt);
            }
        }

        window.onload = initStations;
    </script>
</body>
</html>
